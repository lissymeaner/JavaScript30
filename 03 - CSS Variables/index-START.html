<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Scoped CSS Variables and JS</title>
  <link rel="icon" href="https://fav.farm/🔥" />
</head>
<body>
  <h2>Update CSS Variables with <span class='hl'>JS</span></h2>

  <div class="controls">
    <label for="image">Image:</label>
    <input type="file" accept="image/*" id="image" name="image" />
    
    <label for="spacing">Spacing:</label>
    <input id="spacing" type="range" name="spacing" min="10" max="200" value="10" data-sizing="px">
    
    <label for="blur">Blur:</label>
    <input id="blur" type="range" name="blur" min="0" max="25" value="0" data-sizing="px">
    
    <label for="base">Base Color</label>
    <input id="base" type="color" name="base" value="#ffc600"><br />

    <input type="button" id="reset" name="reset" value="Reset image"/>
  </div>
  
  <img src="https://images.unsplash.com/photo-1465188162913-8fb5709d6d57?ixlib=rb-1.2.1&q=80&fm=jpg&crop=entropy&cs=tinysrgb&w=800&h=500&fit=crop&ixid=eyJhcHBfaWQiOjF9">
  
  <style>

    :root{
      --img-border-spacing:0rem;
      --img-blur:0rem;
      --base-color:#000;
      scrollbar-color: #193549 white;
    }

    .hl{
      color: var(--base-color);
    }

    img{
      border-style: solid;
      border-width: var(--img-border-spacing);
      border-color: var(--base-color);
      filter: blur(var(--img-blur));
    }

    /*
      misc styles, nothing to do with CSS variables
    */

    body {
      text-align: center;
      background: #193549;
      color: white;
      font-family: 'helvetica neue', sans-serif;
      font-weight: 100;
      font-size: 50px;
    }

    .controls {
      margin-bottom: 50px;
    }

    input {
      width: 100px;
    }
  </style>

  <script src="script.js" defer>
  </script>

</body>
</html>
