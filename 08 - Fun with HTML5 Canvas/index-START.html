<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>HTML5 Canvas</title>
  <link rel="icon" href="https://fav.farm/🔥" />
</head>
<body id="open">
  <div class="customise-colour-container">
    <a id="openX" href="#open"><span>X</span></a>
    <a id="closeX" href="#"><span>X</span></a>
  <ul class="colour-options">
    <li class="colour" id="red">
      <svg viewBox="0 0 100 100" x="0" y="0" xmlns="http://www.w3.org/2000/svg"><rect fill="#f00" y="0" x="0" width="100" height="100"/></svg>
      <span>Red</span>
    </li>
    <li class="colour" id="green">
      <svg viewBox="0 0 100 100" x="0" y="0" xmlns="http://www.w3.org/2000/svg"><rect fill="#0f0" y="0" x="0" width="100" height="100"/></svg>
      <span>Green</span>
    </li>
    <li class="colour" id="blue">
      <svg viewBox="0 0 100 100" x="0" y="0" xmlns="http://www.w3.org/2000/svg"><rect fill="#00f" y="0" x="0" width="100" height="100"/></svg>
      <span>Blue</span>
    </li>
    <li class="colour" id="rainbow">
      <svg viewBox="0 0 100 100" x="0" y="0" xmlns="http://www.w3.org/2000/svg"><rect fill="#f00" y="0" x="0" width="100" height="100"/></svg>
      <span>Misc</span>
    </li>
  </ul>
</div>
<canvas id="draw" width="800" height="800"></canvas>
<script src="script.js">

</script>

<style>
  html, body {
    margin: 0;
  }

  a > span, li span {
    display: block;
  }

  .colour-options {
    display: none;
  }

  #openX {
    display: block;
  }
  
  #closeX {
    display: none;
  }

  body:target #openX {
    display: none;
  }

  body:target #closeX {
    display: block;
  }

  body:target .colour-options {
    display: grid;
    width: 20vh;
    list-style-type: none;
    padding: 0;
    grid-auto-flow: row;
    grid-template-columns: 1fr 1fr;
    align-items: end;
    justify-items: start;
    justify-content: space-between;
  }

  .customise-colour-container {
    display: block;
    padding: 4rem;
    position: fixed;
    top: 0;
    left: 0;
  }

  .colour svg rect{
    transform-origin: top;
  }
  
  /* @media (prefers-color-scheme:dark) {
    body {
      background-color:black;
    }
  } */
</style>

</body>
</html>
